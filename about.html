---
layout: default
title: About — Emilia Psacharopoulos
---

<div class="page">

  <section class="about-page-self">
    <div class="self-tagline">Personal</div>
    <h1>About <em>Me</em></h1>
    <p class="about-lead">
      Hi, I'm Emilia. Here are a few things about me outside of work.
    </p>
  </section>

  <section class="about-page-content">

    {% for item in site.data.about %}
    <div class="about-row">
      <div class="about-row-text">
        <h3>{{ item.title }}</h3>
        <p>{{ item.text }}</p>
      </div>
      {% if item.video_src %}
      <div class="about-row-video">
        <iframe src="{{ item.video_src }}" title="{{ item.video_title }}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
      </div>
      {% else %}
      <img src="{{ item.image }}" alt="{{ item.image_alt }}" class="about-row-img">
      {% endif %}
    </div>
    {% endfor %}

  </section>

</div>
