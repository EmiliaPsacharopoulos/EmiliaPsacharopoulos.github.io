university:
  name: University of Michigan
  degree: "B.S.E. Computer Engineering"
  minor: "Minor in Mathematics"
  honors: "Magna Cum Laude"
  location: Ann Arbor
  date: April 2023
  photo: assets/images/grad_photo.jpeg
  summary: |
    At Michigan, I directed my technical electives within the computer engineering program toward mathematical modeling, signal processing, circuit analysis, and core CS fundamentals like data structures and algorithms. I added a math minor because the mathematical side of the computer engineering curriculum (differential equations, signal processing, discrete mathematics) interested me. By senior year, I was concentrating on autonomous robotics and embedded systems, and culminated my studies with a capstone project in <a href="https://web.eecs.umich.edu/~kuipers/teaching/eecs467-F19.html" target="_blank">EECS 467: Autonomous Robotics</a> where my team and I designed and demonstrated a multi-agent path planning and collision avoidance system on physical robots.

