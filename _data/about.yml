- title: Acoustic Guitar
  text: |
    I taught myself the acoustic guitar in high school and have been playing recreationally ever since. My favorite thing is picking a song I want to hear and learning to play it; I tend to gravitate toward fingerstyle pieces like <i>April Come She Will</i> by Simon and Garfunkel. I love playing with or for my friends and family.
  image: /assets/images/guitar.jpg
  image_alt: Acoustic Guitar

- title: Greek
  text: |
    Growing up, I visited Greece many times — my family has roots both near Athens and on a small island in the Cyclades. I didn't grow up speaking Greek apart from when we would visit the country, so I decided to take a handful of Greek language classes in undergrad and have been taking weekly tutoring lessons for over a year now with the goal of progressing from a conversational level to fluency.
  image: /assets/images/Greece.png
  image_alt: Greece

- title: Cooking
  text: |
    One of my favorite pastimes is finding restaurants and trying new cuisines, so living in NYC has been incredible. I also love to cook — mostly Greek food, though I've picked up a lot of other techniques through YouTube tutorials along the way. In 2021, I compiled my grandfather's recipes into a cookbook, which we published on <a href="https://www.amazon.com/Forget-Recipe-Process-George-Psacharopoulos/dp/B09NZ5M616/ref=sr_1_1?crid=3N3JEU4GX3G69&dib=eyJ2IjoiMSJ9.NYaOzdfjfDCW0--FGyK5d3P9iflCSfE78Y4QX89-9dwJTU33pIwiYbsGlgvrNhW-nWD4QFGasWBJEXmgtTkht14iqTRfVQMsc8E5MPZdACqyjlBDit6em3TogLUpR71k.5W8lxAf4PikGh89ChdrD7QSLuhM0z36thE1dmtY9MJg&dib_tag=se&keywords=Forget+the+Recipe%3A%3A+It+is+the+Process&qid=1773808515&sprefix=forget+the+recipe+it+is+the+process%2Caps%2C93&sr=8-1" target="_blank">Amazon</a>.
  image: /assets/images/cooking.png
  image_alt: Cooking

- title: Video Editing
  text: |
    Video editing is one of my favorite creative outlets. I love capturing footage and editing it into a cohesive story to share with friends and family. This video is one of my favorite projects; my family and our close friends in Greece collaborated to write and produce both a song and a music video. You can see more of my work on my <a href="https://www.youtube.com/channel/UCvqminW8coVP_AAPg1MQLEQ" target="_blank">YouTube channel</a>.
  video_src: https://www.youtube.com/embed/FkiHO8xQjcI?si=cKVJR5k0tuGsbN0z
  video_title: Family Music Video

- title: Soccer
  text: |
    I grew up playing soccer, and now play in a handful of leagues here in NYC. I've found adult rec sports leagues to be one of the best ways to meet new friends when you move to a new city.
  image: /assets/images/Soccer.jpg
  image_alt: Soccer

- title: Community Involvement
  text: |
    I started tutoring guitar at <a href="https://www.umsevenmile.org/" target="_blank">Seven Mile</a> during my freshman year of college because I resonated with their mission of providing equal access to arts education in underserved communities. A few hours a week watching students grow, as musicians and as people, was one of the most rewarding parts of my time in college, and in my senior year, I stepped into the Director of Music role to get more involved.
  image: /assets/images/sevenMile.jpg
  image_alt: Seven Mile
