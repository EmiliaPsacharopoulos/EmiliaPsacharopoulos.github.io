- id: p8
  title: "Colorization Model Replication with Loss Function Analysis"
  tag: academic
  cardImg: "assets/images/eecs_442.png"
  cardDesc: "Replicated a deep learning image colorization model to investigate how loss function choice affects output quality."
  subtitle: "EECS 442: Computer Vision"
  subtitleUrl: "https://web.eecs.umich.edu/~justincj/teaching/eecs442/WI2021/syllabus.html"
  date: "Fall 2022"
  tags: ["Python", "Computer Vision", "Deep Learning"]
  links:
    - emoji: "\U0001F4C4"
      label: "View Project Paper"
      url: "assets/pdfs/EECS_442_emiliap_final_report.pdf"
  highlights:
    - 'Replicated Zhang et al.''s <a href="https://richzhang.github.io/colorization/" target="_blank">"Colorful Image Colorization"</a> CNN architecture, training on a 90,000-image subset of the MIT Mini Places dataset'
    - Investigated the impact of loss function choice by substituting the authors' Cross Entropy loss with MSE (Mean Squared Error)
    - Tuned ADAM (Adaptive Moment Estimation) optimizer parameters to compensate for reduced computational resources and training data
    - Demonstrated that MSE produces visibly duller, more monochromatic outputs than Cross Entropy on a pixel classification task
  description:
    - |-
      <a href="https://web.eecs.umich.edu/~justincj/teaching/eecs442/WI2021/syllabus.html" target="_blank">EECS 442</a> covered the core theory and methods of computer vision, including convolutional neural networks, image processing, and deep learning approaches to visual understanding. The course culminated in an independent research report, for which I chose to replicate a published deep learning colorization model and use it to investigate how loss function choice affects output quality.
    - |-
      The model, originally from Zhang et al.'s <a href="https://richzhang.github.io/colorization/" target="_blank">"Colorful Image Colorization" (ECCV 2016)</a>, uses a CNN (Convolutional Neural Network) architecture (a class of neural network that applies learned filters across an image to detect patterns) with downsampling and upsampling layers to compress and reconstruct spatial information, batch normalization to stabilize training, and Leaky ReLU (Rectified Linear Unit) activation functions that introduce non-linearity so the network can learn complex mappings. My replication trained on a 90,000-image subset of the MIT Mini Places dataset using a tuned ADAM (Adaptive Moment Estimation) optimizer, an adaptive gradient descent algorithm that adjusts learning rates per parameter during training, and deliberately omitted the authors' class-rebalancing method to isolate the variable I was testing: replacing their Cross Entropy loss function with MSE (Mean Squared Error).
    - |-
      The results were clear. MSE produced consistently duller, more monochromatic outputs — only blues retained any vibrancy across test images. My explanation was that MSE, designed for regression problems where outputs can range across any value, converges much more slowly on a classification task like colorization than Cross Entropy, which is purpose-built to penalize confident wrong predictions. The experiment confirmed that loss function choice is not just a technical detail: it has a direct, visible impact on what a model actually learns to produce.
  media:
    - src: /assets/images/eecs_442.png
      alt: Colorization Results

