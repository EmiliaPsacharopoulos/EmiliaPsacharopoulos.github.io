- id: e1
  jobTitle: "Engineering Intern"
  company: "The George Washington University"
  logo: "assets/images/george_washington_university_logo.png"
  location: "Ashburn, VA"
  dates: "June 2018 – August 2018"
  tagline: "Supported PhD research on hydrophobic aluminum treatment methods and independently designed a phase change materials heat retention experiment using the lab's facilities."
  website: "https://www.gwu.edu/"
  tags: ["Experimental Design", "Materials Science"]
  highlights:
    - 'Took an unpaid internship before college to get firsthand exposure to engineering research; supported PhD students studying <a href="https://technologies.research.gwu.edu/technology/45714#:~:text=Researchers%20at%20GW%20have%20invented,of%20ice%20in%20various%20surfaces." target="_blank">hydrophobic aluminum treatment methods</a> for arctic-bound container ship hulls'
    - Designed and built an experiment at the end of the summer to test how different phase change materials retained heat under varying ambient conditions, using lab facilities and materials from the PhD team's own research
  description:
    - |-
      The summer before starting college I took an unpaid internship at a mechanical engineering research lab at George Washington University, mostly to get a firsthand sense of what research actually looks like before deciding how much to pursue it in college. The day-to-day was unglamorous: compiling notes from research papers, washing labware, preparing samples, and taking observations during experiments run by PhD students studying <a href="https://technologies.research.gwu.edu/technology/45714#:~:text=Researchers%20at%20GW%20have%20invented,of%20ice%20in%20various%20surfaces." target="_blank">hydrophobic aluminum treatment methods</a> to prevent hull cracking in container ships bound for arctic regions.
    - |-
      At the end of the summer the team gave me free rein to pick a topic related to the research and use the lab facilities to explore it. I designed and built a metal block with a grid of drilled cavities to test how different phase change materials (materials the PhD students were evaluating) retained heat under varying ambient conditions. The experiment involved heating the block for a set duration, then measuring how long each material held its temperature once removed from the heat source.
  media:
    - src: /assets/images/gwu.png
      alt: GWU Internship

